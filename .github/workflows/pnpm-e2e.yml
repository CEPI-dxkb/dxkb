name: E2E (Playwright)

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    branches:
      - main
      - test
      - dev

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    env:
      BROWSER: ${{ matrix.browser }}

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ matrix.browser }}-

      # Chromium is always required because the setup-signed-in project runs on chromium
      # (it seeds cookies into storageState and has no browser-specific behavior).
      - name: Install Playwright browsers
        run: |
          if [ "$BROWSER" = "chromium" ]; then
            pnpm exec playwright install --with-deps chromium
          else
            pnpm exec playwright install --with-deps chromium "$BROWSER"
          fi

      - name: Build app
        run: pnpm build

      - name: Run e2e tests
        run: pnpm e2e --project=setup-signed-in --project="$BROWSER"
        env:
          CI: "true"
          # Server components on /workspace/[username]/** call getRequiredEnv("WORKSPACE_GUIDE_URL")
          # at request time. .env is gitignored so CI has no default; set a placeholder here so the
          # pages render (the value is only used as a link href, never fetched by the tests).
          WORKSPACE_GUIDE_URL: "https://www.bv-brc.org/docs/quick_references/workspace_groups_upload.html"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
